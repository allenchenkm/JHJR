<!DOCTYPE html>

    <style>
        :root {
            --primary-color: #D32F2F; /* 金融红 */
            --primary-light: #FFEBEE;
            --text-main: #1A1A1A;
            --text-sub: #666666;
            --bg-color: #F8F9FA;
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", STHeiti, "Microsoft Yahei", Tahoma, Simsun, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* 顶部红色品牌背景 */
        .bg-decoration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 35vh;
            background: linear-gradient(135deg, #E53935 0%, #B71C1C 100%);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            z-index: 0;
            box-shadow: 0 4px 20px rgba(183, 28, 28, 0.4);
        }

        .main-content {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            text-align: center;
            margin-top: 4vh;
        }

        .app-icon-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 24px;
        }

        .app-icon {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            object-fit: cover;
            box-shadow: 0 10px 24px rgba(211, 47, 47, 0.25);
            border: 3px solid #fff;
            background-color: #fff;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-sub);
            margin-bottom: 36px;
            line-height: 1.6;
            font-weight: 400;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 0;
            margin-bottom: 16px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .download-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.15);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .download-btn:active::after, .download-btn:hover::after {
            opacity: 1;
        }

        .btn-ios {
            background-color: #1A1A1A;
            color: #FFFFFF;
            box-shadow: 0 8px 20px rgba(26, 26, 26, 0.2);
        }

        .btn-android {
            background-color: var(--primary-color);
            color: #FFFFFF;
            box-shadow: 0 8px 20px rgba(211, 47, 47, 0.35);
        }

        .btn-icon {
            width: 22px;
            height: 22px;
            margin-right: 10px;
            fill: currentColor;
        }

        .features {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px dashed #E0E0E0;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .feature-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background-color: var(--primary-light);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .feature-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .feature-text {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 500;
        }

        .footer {
            margin-top: auto;
            padding: 30px 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
            z-index: 1;
        }

        .footer p {
            margin-bottom: 5px;
        }

        /* 微信提示遮罩层 */
        .wechat-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 9999;
            color: white;
            text-align: right;
            padding: 20px 30px;
        }

        .wechat-arrow {
            display: inline-block;
            font-size: 50px;
            margin-top: 10px;
            margin-right: 15px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-15px) translateX(15px); }
        }

        .wechat-text {
            clear: both;
            font-size: 20px;
            margin-top: 40px;
            line-height: 1.8;
            text-align: center;
            font-weight: 500;
        }
        
        .wechat-text span {
            color: #FF5252;
            font-weight: bold;
            padding: 0 4px;
        }
    </style>
</head>
